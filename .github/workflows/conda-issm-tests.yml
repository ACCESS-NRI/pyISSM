name: Run ISSM-pyISSM Tests [conda environment]

on:
  workflow_call:
    inputs:
      build-type:
        description: Type of ISSM build to download from artifacts
        required: true
        type: string
      test-args:
        description: Arguments to pass to run-tests.py
        required: false
        type: string
      issm-release:
        description: Pinned ISSM release tag
        required: true
        type: string
env:
  ISSM_DIR: ${{ github.workspace }}/issm

jobs:
  test:
    name: Run ISSM-pyISSM Tests [conda environment]
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout pyISSM
        uses: actions/checkout@v4

      - name: Download ISSM artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.build-type }}-${{ inputs.issm-release }}-python3.11-${{ runner.os }}

      - name: Extract ISSM artifact
        run: |
          mkdir -p ${{ env.ISSM_DIR }}
          tar -xzf ${{ inputs.build-type }}-${{ inputs.issm-release }}-python3.11-${{ runner.os }}.tar.gz -C ${{ env.ISSM_DIR }}

      - name: Set up micromamba environment
        uses: mamba-org/setup-micromamba@v2
        with:
          environment-file: environment.yaml
          environment-name: pyissm
          init-shell: bash
          cache-environment: true
          cache-environment-key: pyissm-${{ runner.os }}-${{ hashFiles('environment.yaml') }}

      - name: Show environment info
        shell: bash -l {0}
        run: |
          which python
          python -V
          micromamba list

      - name: Install pyISSM
        shell: bash -l {0}
        run: |
          pip install --upgrade pip setuptools wheel
          pip install --upgrade --force-reinstall --editable .

      - name: Check wrappers
        shell: bash -l {0}
        run: |
          source "$ISSM_DIR/etc/environment.sh"
          export PYTHONPATH="$ISSM_DIR/src/wrappers:$PYTHONPATH"
          export LD_LIBRARY_PATH="$CONDA_PREFIX/lib:${LD_LIBRARY_PATH:-}"
          python -c "import pyissm; print('Wrappers installed:', pyissm.tools.wrappers.check_wrappers_installed())"

      - name: Run tests
        shell: bash -l {0}
        run: |
          source "$ISSM_DIR/etc/environment.sh"
          export PYTHONPATH="$ISSM_DIR/src/wrappers:$PYTHONPATH"
          export LD_LIBRARY_PATH="$CONDA_PREFIX/lib:${LD_LIBRARY_PATH:-}"
          cd test/ci_tests
          python -u ./run-tests.py ${{ inputs.test-args }}
      - name: Run benchmark on main
        env:
          ISSM_DIR: ${{ env.ISSM_DIR }}
        run: |
          source "$ISSM_DIR/etc/environment.sh"
          mkdir -p benchmark-results
          python test/general/benchmarking/test_benchmark_test110.py | tee benchmark-results/main.log

      - name: Extract main average runtime
        working-directory: repo
        run: |
          python - <<'PY'
          import pathlib
          import re
          import sys

          text = pathlib.Path("benchmark-results/main.log").read_text()
          match = re.search(r"avg\s*:\s*([0-9.]+)\s*s", text)
          if not match:
              print("Could not find average runtime in main.log", file=sys.stderr)
              sys.exit(1)

          avg = match.group(1)
          pathlib.Path("benchmark-results/main_avg.txt").write_text(avg + "\n")
          print(f"Main average runtime: {avg} s")
          PY

      - name: Upload main benchmark artifact
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-main
          path: repo/benchmark-results/


  compare:
    name: Compare main vs PR benchmark
    runs-on: ubuntu-latest
    needs:
      - benchmark_main
      - benchmark_pr
    timeout-minutes: 30

    steps:
      - name: Download main artifact
        uses: actions/download-artifact@v4
        with:
          name: benchmark-main
          path: benchmark-main

      - name: Download PR artifact
        uses: actions/download-artifact@v4
        with:
          name: benchmark-pr
          path: benchmark-pr

      - name: Compare runtimes
        run: |
          python - <<'PY'
          import pathlib
          import sys

          threshold_percent = float("${{ env.SLOWDOWN_THRESHOLD_PERCENT }}")

          main_avg = float(pathlib.Path("benchmark-main/main_avg.txt").read_text().strip())
          pr_avg = float(pathlib.Path("benchmark-pr/pr_avg.txt").read_text().strip())

          slowdown_percent = ((pr_avg - main_avg) / main_avg) * 100.0

          print(f"Main average runtime: {main_avg:.3f} s")
          print(f"PR average runtime:   {pr_avg:.3f} s")
          print(f"Relative slowdown:    {slowdown_percent:.2f}%")

          summary = pathlib.Path("benchmark_summary.md")
          summary.write_text(
              "\n".join([
                  "# Benchmark Summary",
                  "",
                  f"- Main average runtime: **{main_avg:.3f} s**",
                  f"- PR average runtime: **{pr_avg:.3f} s**",
                  f"- Relative slowdown: **{slowdown_percent:.2f}%**",
                  f"- Failure threshold: **{threshold_percent:.2f}%**",
                  "",
              ])
          )

          if slowdown_percent > threshold_percent:
              print(
                  f"Performance regression detected: PR is slower than main by "
                  f"{slowdown_percent:.2f}% (threshold {threshold_percent:.2f}%).",
                  file=sys.stderr,
              )
              sys.exit(1)

          print("No significant performance regression detected.")
          PY

      - name: Upload comparison summary
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-summary
          path: benchmark_summary.md
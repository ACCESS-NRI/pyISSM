name: Run ISSM-pyISSM Tests

on:
  workflow_call:
    inputs:
      build-type:
        description: "Type of ISSM build to download from artifacts"
        required: true
        type: string
      test-args:
        description: "Arguments to pass to run-tests.py"
        required: false
        type: string
      issm-release:
        description: "Pinned ISSM release"
        required: true
        type: string
# Set ISSM_DIR environment variable
env:
  ISSM_DIR: ${{ github.workspace }}/issm

jobs:
  test:
    name: Run ISSM-pyISSM Tests (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Run tests for multiple versions of python
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - name: Checkout pyISSM
        uses: actions/checkout@v4
      # Set up python (for given version[s])
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Download ISSM artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.build-type }}-${{ inputs.issm-release }}-python${{ matrix.python-version }}-${{ runner.os }}

      - name: Extract ISSM artifact
        run: |
          mkdir -p ${{ env.ISSM_DIR }}
          tar -xzf ${{ inputs.build-type }}-${{ inputs.issm-release }}-python${{ matrix.python-version }}-${{ runner.os }}.tar.gz -C ${{ env.ISSM_DIR }}

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install numpy scipy netcdf4 matplotlib

      - name: Install pyISSM
        run: |
          pip install --upgrade --force-reinstall --editable .

      - name: Verify environment
        run: |
          set -euxo pipefail
          export ISSM_DIR="${GITHUB_WORKSPACE}/issm"
          export PATH="$ISSM_DIR/bin:$PATH"
          set +u; source "$ISSM_DIR/etc/environment.sh"; set -u
          echo "ISSM_DIR=$ISSM_DIR"
          which issm.exe
          ls -l "$ISSM_DIR/bin/issm.exe"
          python - <<'PY'
          import os
          import pyissm
          print("pyissm file:", pyissm.__file__)
          print("ISSM_DIR env:", os.environ.get("ISSM_DIR"))
          PY

      - name: Check wrappers
        run: |
          set -euxo pipefail
          export ISSM_DIR="${GITHUB_WORKSPACE}/issm"
          export PATH="$ISSM_DIR/bin:$PATH"
          set +u; source "$ISSM_DIR/etc/environment.sh"; set -u
          python -c "import pyissm; print('Wrappers installed:', pyissm.tools.wrappers.check_wrappers_installed())"

      - name: Run tests
        run: |
          set -euxo pipefail
          export ISSM_DIR="${GITHUB_WORKSPACE}/issm"
          export PATH="$ISSM_DIR/bin:$PATH"
          set +u; source "$ISSM_DIR/etc/environment.sh"; set -u
          cd ./test/ci_tests/
          python -u ./run-tests.py ${{ inputs.test-args }}